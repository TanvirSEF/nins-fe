# Dokploy: point the project at this repo in "Docker Compose" mode.
# The reverse proxy targets container port 3000. To change the backend URL per
# environment, set the NEXT_PUBLIC_API_URL BUILD ARG in Dokploy (it is inlined
# at build time) — not a runtime env var.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://nins.zephlotech.com/api}
    image: nins-fe:latest
    container_name: nins-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
